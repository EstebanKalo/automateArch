# ArchInstaller — Calamares settings.conf
# https://github.com/calamares/calamares/wiki/settings.conf

modules-search: [ local, /usr/lib/calamares/modules ]

# ─── Module sequence ──────────────────────────────────────────────────
# "show" = visible step in the GUI sidebar
# "exec" = background execution step

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - shellprocess@pacstrap
      - fstab
      - localecfg
      - networkcfg
      - hwclock
      - users
      - shellprocess@post_install
      - bootloader
      - services-systemd
      - shellprocess@cleanup
  - show:
      - finished

branding: archinstaller

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

quit-at-end: false
