insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font

set default="archinstaller"
set timeout=5
set gfxmode=auto
set gfxpayload=keep

loadfont "unicode"
terminal_output gfxterm

menuentry "ArchInstaller (x86_64, UEFI)" --id archinstaller {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "ArchInstaller (nomodeset / safe graphics)" --id archinstaller-nomodeset {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}
